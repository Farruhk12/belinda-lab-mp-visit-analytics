
<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belinda Lab Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                primary: '#424B52',
                accent: '#DF3B20',
                bg: '#F5F5F5'
              }
            },
            borderRadius: {
              'xl': '12px',
              '2xl': '16px',
              '3xl': '24px'
            },
            animation: {
              fadeIn: 'fadeIn 0.3s ease-out',
              slideIn: 'slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
              slideDown: 'slideDown 0.3s ease-out',
              slideUp: 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)'
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideIn: { '0%': { transform: 'scale(0.9) translateY(20px)', opacity: '0' }, '100%': { transform: 'scale(1) translateY(0)', opacity: '1' } },
              slideDown: { '0%': { transform: 'translateY(-10px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #F5F5F5;
        letter-spacing: -0.011em;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.1);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(0,0,0,0.2);
      }
      .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
      .animate-slideDown { animation: slideDown 0.3s ease-out; }
      .animate-slideUp { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

      /* Fullscreen loader — bouncing dots */
      @keyframes loadingBounce {
        0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
      .loading-dot {
        animation: loadingBounce 1.2s infinite ease-in-out;
      }

      /* Fullscreen loader — progress bar shimmer */
      @keyframes loadingBar {
        0% { width: 0%; }
        20% { width: 25%; }
        50% { width: 60%; }
        80% { width: 85%; }
        100% { width: 95%; }
      }
      .loading-bar {
        animation: loadingBar 4s ease-out forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</body>
</html>
